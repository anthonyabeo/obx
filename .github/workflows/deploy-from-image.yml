name: CI — Deploy image to VPS

# This workflow runs after the image is built and pushed by the build workflow.
# It can be triggered manually or by using `workflow_run` from the build workflow.

on:
  workflow_run:
    workflows: ["CI — Build and push Docker image"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Ansible on runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook (deploy image)
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/obx:${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          cat > "$TMP_DIR/extra_vars.json" <<JSON
          {
            "image": "${IMAGE}",
            "build_on_vps": false,
            "git_ref": "${{ github.event.workflow_run.head_branch }}",
            "domain": "${{ secrets.DEPLOY_DOMAIN }}",
            "email": "${{ secrets.DEPLOY_EMAIL }}"
          }
          JSON

          ansible-playbook -i .ansible/inventory.ini .ansible/playbook.yml --extra-vars "@$TMP_DIR/extra_vars.json" -vv

