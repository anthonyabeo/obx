name: CI — Build, push image and deploy to VPS

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Ensure code is formatted
        run: |
          # show any gofmt diffs and fail if there are unformatted files
          unformatted=$(gofmt -l . | wc -l)
          if [ "$unformatted" -ne 0 ]; then
            echo "The following files are not gofmt'ed:" 
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: |
          go vet ./...

      - name: Install Graphviz (dot)
        # Graphviz provides the `dot` executable used by tests that render graphs.
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run unit tests
        run: |
          go test -v ./...

#      - name: Diagnostic show Go and environment info
#        run: |
#          go version
#          go env GOPATH GOMODCACHE GOCACHE GOMOD GOWORK GOFLAGS
#
#      - name: Clear Go build and module cache (avoid stale export data)
#        run: |
#          # Remove cached compiled export data that may have been produced by a different Go toolchain
#          go clean -cache -testcache -modcache || true
#          # also clear module download cache to force fresh downloads
#          rm -rf "$(go env GOPATH)/pkg/mod/cache" || true
#
#      - name: Run golangci-lint
#        uses: golangci/golangci-lint-action@v4
#        with:
#          version: v1.59.0
#          args: --timeout=5m
#
#      - name: Set up Node (for vendor script)
#        uses: actions/setup-node@v4
#        with:
#          node-version: '18'

      - name: Run vendor script (if present)
        run: |
          if [ -x ./scripts/vendor_static.sh ]; then ./scripts/vendor_static.sh; fi || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Ansible on runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook (deploy)
        run: |
          set -euo pipefail
          
          # Create a secure temporary directory (runner ephemeral)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          
          # Extract the public key from the PEM secret using process substitution
          PUBKEY=$(ssh-keygen -y -f <(printf '%s' "${{ secrets.VPS_SSH_KEY }}"))
          
          # Generate well-formed JSON with the pubkey placed safely via environment variable
          PUBKEY="$PUBKEY" python3 - <<'PY' > "$TMP_DIR/extra_vars.json"
          import os, json
          data = {
            "deploy_user": "obx",
            "git_ref": "main",
            "domain": "obxplayground.trunkwhorl.com",
            "email": "${{ secrets.DEPLOY_EMAIL }}",
            "deploy_user_pubkey": os.environ.get("PUBKEY", "")
          }
          print(json.dumps(data))
          PY

          # Run ansible-playbook using ssh-agent (the private key is already loaded by webfactory/ssh-agent)
          ansible-playbook -i .ansible/inventory.ini .ansible/playbook.yml --extra-vars "@$TMP_DIR/extra_vars.json" -vv

      - name: External healthcheck
        run: |
          curl --fail --silent --show-error https://obxplayground.trunkwhorl.com/api/version



