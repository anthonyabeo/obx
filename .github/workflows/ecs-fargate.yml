name: CI — Build & Deploy to ECS Fargate

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Set up Node (optional, used by vendor script)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run format/lint/tests
        run: |
          go vet ./...
          go test ./... 

      - name: Run vendor script (optional)
        run: |
          if [ -x ./scripts/vendor_static.sh ]; then ./scripts/vendor_static.sh; fi || true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          echo "Building ${IMAGE_URI}"
          docker build -t ${IMAGE_URI} .
          docker push ${IMAGE_URI}
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Get pushed image digest
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        id: digest
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          # Query ECR for digest of the pushed image tag
          DIGEST=$(aws ecr describe-images --region ${AWS_REGION} --repository-name ${ECR_REPOSITORY} --image-ids imageTag=${IMAGE_TAG} --query 'imageDetails[0].imageDigest' --output text)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Update ECS service to use new image
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}@${{ steps.digest.outputs.digest }}

          echo "Fetching current task definition for service ${ECS_SERVICE}"
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services --cluster ${ECS_CLUSTER} --services ${ECS_SERVICE} --query 'services[0].taskDefinition' --output text)
          echo "Current task def: ${CURRENT_TASK_DEF_ARN}"

          echo "Downloading task definition JSON"
          aws ecs describe-task-definition --task-definition ${CURRENT_TASK_DEF_ARN} --query 'taskDefinition' > /tmp/taskdef.json

          echo "Patching container image to ${IMAGE_URI}"
          # Use jq to update image field in containerDefinitions for the primary container
          cat /tmp/taskdef.json | \
            jq --arg img "${IMAGE_URI}" 'del(.status,.revision,.taskDefinitionArn,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions |= (map(.image=$img))' > /tmp/new-taskdef.json

          echo "Registering new task definition"
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/new-taskdef.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${NEW_TASK_DEF_ARN}"

          echo "Updating service to new task definition"
          aws ecs update-service --cluster ${ECS_CLUSTER} --service ${ECS_SERVICE} --task-definition ${NEW_TASK_DEF_ARN}

      - name: Wait for service stability
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable --cluster ${ECS_CLUSTER} --services ${ECS_SERVICE}

      - name: Smoke test deployed service
        if: ${{ secrets.ALLOW_SMOKE_TEST == 'true' }}
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
        run: |
          echo "Checking ${SERVICE_URL}/api/version"
          curl -fS ${SERVICE_URL}/api/version | jq .

