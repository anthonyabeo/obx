name: CI — Build and push Docker image

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Ensure code is formatted
        run: |
          unformatted=$(gofmt -l . | wc -l)
          if [ "$unformatted" -ne 0 ]; then
            echo "The following files are not gofmt'ed:" 
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: |
          go vet ./...

      - name: Install Graphviz (dot)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run unit tests
        run: |
          go test -v ./...

      - name: Run vendor script (if present)
        run: |
          if [ -x ./scripts/vendor_static.sh ]; then ./scripts/vendor_static.sh; fi || true

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/obx:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/obx:latest
          platforms: linux/amd64



