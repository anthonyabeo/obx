---
- name: Deploy obx playground to a VPS
  hosts: web
  become: yes
  vars:
    deploy_user: "ubuntu"
    image: "obx:latest"
    domain: "obxplayground.trunkwhorl.com"
    email: "patty.wagers3t@icloud.com"
    git_repo: "https://github.com/anthonyabeo/obx.git"
    git_ref: "main"
    compose_version: "v2.21.2"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - git
          - nginx
          - ufw
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Ensure deploy user exists
      user:
        name: "{{ deploy_user }}"
        groups: sudo,docker
        append: yes
        shell: /bin/bash

    - name: Ensure deploy directory exists
      file:
        path: "/home/{{ deploy_user }}/deploy"
        state: directory
        owner: "{{ deploy_user }}"
        mode: '0755'

    - name: Ensure app checkout exists (clone or update)
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "/home/{{ deploy_user }}/deploy/app"
        version: "{{ git_ref }}"
        force: yes
        update: yes
        accept_hostkey: yes
      become: yes
      become_user: "{{ deploy_user }}"

    - name: Template docker-compose to remote
      template:
        src: templates/docker-compose.yml.j2
        dest: "/home/{{ deploy_user }}/deploy/docker-compose.yml"
        owner: "{{ deploy_user }}"
        mode: '0644'

    - name: Template nginx site configuration
      template:
        src: templates/nginx-obx.conf.j2
        dest: /etc/nginx/sites-available/obx
        owner: root
        mode: '0644'
      notify: Reload nginx

    - name: Ensure nginx site is enabled
      file:
        src: /etc/nginx/sites-available/obx
        dest: /etc/nginx/sites-enabled/obx
        state: link
      notify: Reload nginx

    - name: Allow OpenSSH through UFW
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow Nginx Full (80,443)
      ufw:
        rule: allow
        name: 'Nginx Full'

    - name: Ensure docker service is started
      service:
        name: docker
        state: started
        enabled: yes

    - name: Build docker image on VPS (build-on-VPS)
      become_user: "{{ deploy_user }}"
      shell: |
        set -euo pipefail
        cd /home/{{ deploy_user }}/deploy/app
        docker build --pull -t {{ image }} .
      args:
        executable: /bin/bash

    - name: Template systemd unit for obx container
      template:
        src: templates/obx.service.j2
        dest: /etc/systemd/system/obx.service
        owner: root
        mode: '0644'
      notify:
        - Reload systemd

    - name: Ensure obx service is started and enabled
      systemd:
        name: obx.service
        enabled: yes
        state: restarted
        daemon_reload: yes

    - name: Wait for local health endpoint
      become: false
      shell: curl -sSf http://127.0.0.1:8080/api/version
      register: hc
      retries: 12
      delay: 5
      until: hc.rc == 0

    - name: If healthcheck failed, enable maintenance page and surface logs
      when: hc is failed
      block:
        - name: Copy maintenance page into place
          copy:
            src: files/maintenance.html
            dest: /var/www/maintenance/maintenance.html
            owner: root
            mode: '0644'
        - name: Reload nginx to pick up maintenance page
          service:
            name: nginx
            state: reloaded
        - name: Show last 200 lines of container logs for debugging
          become_user: "{{ deploy_user }}"
          shell: |
            cd /home/{{ deploy_user }}/deploy
            docker logs --tail 200 obx || true
          args:
            executable: /bin/bash
          register: logs
        - name: Fail deployment with logs
          fail:
            msg: "Healthcheck failed; maintenance page enabled. Container logs:\n{{ logs.stdout }}"

    - name: Obtain TLS certificate with certbot (if domain provided)
      when: domain != '' and email != ''
      block:
        - name: Validate deploy email looks valid
          assert:
            that:
              - "'@' in email"
              - "'.' in email"
              - "'example.com' not in email"
            fail_msg: "Invalid deploy email '{{ email }}'. Set a real contact email (not a placeholder) before requesting TLS certificates."

        - name: Obtain TLS certificate with certbot
          command: certbot --nginx -d {{ domain }} --non-interactive --agree-tos --email {{ email }}

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
    - name: Reload systemd
      command: systemctl daemon-reload
      become: yes

