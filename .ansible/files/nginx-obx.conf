## nginx site config for obx — place at /etc/nginx/sites-available/obx and symlink to sites-enabled
## Replace playground.example.com with your actual domain

server {
    listen 80;
    server_name playground.example.com; # <== replace with your domain

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: serve health check locally (not necessary if backend provides /api/version)
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/api/version;
    }
}

