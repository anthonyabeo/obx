<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>obx — Oberon+ Playground</title>
  <link rel="stylesheet" href="/static/css/playground.css">
</head>
<body>

<header>
  <h1>obx</h1>
  <span class="tagline">Oberon+ Playground</span>
  <div class="header-actions" style="margin-left:12px; display:flex; gap:8px; align-items:center;">
    <!-- action buttons: icons only -->
    <button id="cfgBtn" class="icon-btn action cfg" title="Show CFG" aria-label="Show CFG">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M13 6h3"></path><path d="M11 13l-2-2"></path></svg>
    </button>
    <button id="runBtn" class="icon-btn action run" title="Run program" aria-label="Run program">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#60A5FA" stroke="#60A5FA" stroke-width="0" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v18l15-9L5 3z"/></svg>
    </button>
    <button id="checkBtn" class="icon-btn action check" title="Check" aria-label="Check">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
    </button>
  </div>
  <div class="hdr-right">
    <button id="uploadBtn" class="icon-btn" title="Upload file" aria-label="Upload file" style="margin-right:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
    </button>
    <span class="cors-badge">CORS enabled</span>
    <span class="version" id="versionBadge"></span>
  </div>
</header>

<div class="workspace">

  <div class="topRow">
    <!-- ── Editor pane ─────────────────────────── -->
    <div class="pane" id="editorPane">
      <div class="pane-header">
        <span class="pane-label">source</span>
          <input id="filename" type="text" value="Main.obx" spellcheck="false" title="filename sent to the API" aria-label="Filename" />
        <div class="spacer"></div>
      </div>
      <div id="editor" role="region" aria-label="Source editor"></div>
    </div>

    <!-- ── Diagnostics pane ────────────────────── -->
    <div class="pane" id="diagPane">
      <div class="pane-header">
        <span class="pane-label">diagnostics</span>
        <div class="spacer"></div>
        <span id="statusText" class="status idle">—</span>
      </div>
      <div id="results">
        <div class="empty">🔍&nbsp; Press <strong>Check</strong> or hit ⌘ Enter</div>
      </div>
    </div>

    <!-- ── CFG pane ─────────────────────────────── -->
    <div class="pane" id="cfgPane">
      <div class="pane-header">
        <span class="pane-label">control flow graph</span>
        <div class="spacer"></div>
        <div class="cfg-controls">
          <span class="cfg-hint">scroll&thinsp;·&thinsp;drag&thinsp;·&thinsp;dbl-click to fit</span>
          <button id="fitCfgBtn" class="icon-btn" onclick="" title="Fit to view" aria-label="Fit to view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
            <span class="btn-text">fit</span>
          </button>
          <button id="resetCfgBtn" class="icon-btn" onclick="" title="Reset zoom" aria-label="Reset zoom">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
            <span class="btn-text">1:1</span>
          </button>
        </div>
      </div>
      <div class="fn-tabs" id="fnTabs"></div>
      <div id="cfgView">
        <div id="cfgInner"></div>
        <div id="cfgPlaceholder">🔍&nbsp; Press <strong style="color:#4b5563">Check</strong> to see the CFG</div>
      </div>
    </div>
  </div><!-- .topRow -->

  <div class="bottomRow">
    <!-- ── Terminal pane ────────────────────── -->
    <div class="pane" id="termPane">
      <div class="pane-header">
        <span class="pane-label">terminal</span>
        <div class="spacer"></div>
        <button id="clearTermBtn" class="icon-btn" title="Clear" aria-label="Clear terminal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6v12a2 2 0 0 0 2 2h4"></path></svg>
          <span class="btn-text">Clear</span>
        </button>
      </div>
      <div id="terminal" style="flex:1; overflow:auto; background:#0b1220; border:1px solid #2d3148; border-radius:6px; padding:10px; font-family: ui-monospace, monospace; font-size:.85rem; white-space:pre-wrap;">$</div>
    </div>
  </div><!-- .bottomRow -->

</div><!-- .workspace -->

<!-- viz.js 2.x full renderer — required for HTML-like labels (<B>, <BR/>, <FONT>) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/viz.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/full.render.js"></script>
<script src="/static/js/playground.js"></script>

<!-- Inline event hookup uses a per-response nonce injected by the server. -->
<script nonce="%CSP_NONCE%">
  (function(){
    function on(id, fn){
      var el = document.getElementById(id);
      if(el && fn) el.addEventListener('click', fn);
    }
    // Attach handlers — functions (toggleCfg, runProgram, runCheck, clearTerminal,
    // fitCfg, resetCfg) are defined in /static/js/playground.js and expected to be
    // available on window.
    on('cfgBtn', window.toggleCfg);
    on('runBtn', window.runProgram);
    on('checkBtn', window.runCheck);
    on('clearTermBtn', window.clearTerminal);
    on('fitCfgBtn', window.fitCfg);
    on('resetCfgBtn', window.resetCfg);
  })();
</script>
</body>
</html>
